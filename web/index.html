<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warhammer 40K Calculator</title>
  <style>
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --ink: #171b21;
      --muted: #5f6875;
      --line: #d7dde4;
      --red: #a6292e;
      --red-dark: #7f1e25;
      --gold: #aa7a1e;
      --green: #24745f;
      --steel: #486174;
      --blue: #1f5f97;
      --soft: #f6f8fa;
      --shadow: 0 10px 28px rgba(23, 27, 33, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #20262e;
      color: #fff;
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .status {
      color: #ccd6e1;
      font-size: 13px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
    }

    section,
    aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      padding: 16px;
      align-self: start;
    }

    .results {
      padding: 0;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }

    .unit-combo {
      position: relative;
    }

    .combo-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      gap: 6px;
    }

    .combo-toggle {
      min-height: 38px;
      padding: 0;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
    }

    .combo-menu {
      position: absolute;
      z-index: 40;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      overflow: hidden;
      border: 1px solid #b9c7d6;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(23, 27, 33, .18);
      display: none;
    }

    .combo-menu.open {
      display: block;
    }

    .unit-combo.menu-open .combo-menu {
      position: static;
      margin-top: 4px;
      width: 100%;
    }

    .combo-menu-head {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #f7fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .combo-done {
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }

    .combo-options {
      max-height: min(280px, 42vh);
      overflow: auto;
    }

    .combo-footer {
      padding: 7px 10px;
      border-top: 1px solid var(--line);
      background: #f7fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .combo-option {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-weight: 600;
    }

    .combo-option:last-child {
      border-bottom: 0;
    }

    .combo-option:hover,
    .combo-option:focus-visible,
    .combo-option.active {
      background: #eef5fb;
    }

    .combo-option[aria-selected="true"] {
      border-left: 3px solid var(--blue);
      padding-left: 7px;
    }

    .combo-option span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .selected-unit-info {
      min-height: 18px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .selected-unit-info details {
      display: inline;
      margin-left: 4px;
    }

    .selected-unit-info summary {
      display: inline;
      color: var(--blue);
      cursor: pointer;
      font-weight: 700;
    }

    .selected-unit-info summary::-webkit-details-marker {
      display: none;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 2px solid rgba(31, 95, 151, .32);
      outline-offset: 2px;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .segment {
      min-height: 34px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 8px 10px;
    }

    .segment.active {
      background: var(--blue);
      color: #fff;
    }

    .switches {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .options-group {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 0 12px 12px;
    }

    .options-group summary {
      margin: 0 -12px;
      padding: 11px 12px;
      cursor: pointer;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .options-group:not([open]) {
      padding-bottom: 0;
    }

    .context-title {
      margin-top: 16px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 14px;
      text-transform: none;
      font-weight: 500;
      margin: 0;
    }

    .check input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--red);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      position: sticky;
      bottom: 0;
      z-index: 15;
      padding: 12px 0 0;
      background: linear-gradient(to bottom, rgba(255,255,255,.78), #fff 34%);
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--red);
      color: #fff;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
    }

    button.secondary {
      background: #e4e9ef;
      color: var(--ink);
    }

    button.tertiary {
      background: #eef3f7;
      color: var(--blue);
      border: 1px solid var(--line);
    }

    button:disabled {
      opacity: .55;
      cursor: wait;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .metric {
      padding: 14px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child { border-right: 0; }

    .metric b {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .duel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--line);
    }

    .judgement {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #f7f9fb;
    }

    .judgement.primary {
      background: #fff;
      border-left: 4px solid var(--red);
    }

    .judgement h3 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .judgement p {
      margin: 0;
      color: var(--muted);
    }

    .judgement strong {
      color: var(--ink);
    }

    .judgement.ml {
      background: #f5fbf8;
    }

    .loadout-warning {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff8e8;
      color: #624812;
      font-size: 13px;
      font-weight: 650;
    }

    .review-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .review-head h2 {
      margin-bottom: 6px;
    }

    .review-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .review-section {
      padding: 16px;
      border-top: 1px solid var(--line);
    }

    .review-section:first-of-type {
      border-top: 0;
    }

    .review-section h3 {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .report-markdown {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f7fafc;
      color: var(--ink);
      padding: 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .report-markdown h4 {
      margin: 12px 0 6px;
      font-size: 14px;
    }

    .report-markdown h4:first-child {
      margin-top: 0;
    }

    .report-markdown p {
      margin: 0 0 8px;
    }

    .report-markdown ul {
      margin: 0 0 10px;
      padding-left: 20px;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 14px;
      background: #fff;
      font-size: 12px;
    }

    .report-table th,
    .report-table td {
      padding: 7px 8px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .report-table th {
      background: #edf2f7;
      font-weight: 800;
    }

    .review-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .review-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #f7fafc;
    }

    .review-nav a {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--blue);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .review-tools {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 180px auto;
      gap: 10px;
      align-items: end;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .review-tools label {
      display: grid;
      gap: 5px;
      margin: 0;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
    }

    .review-tools input,
    .review-tools select {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }

    .review-tools button {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #edf2f7;
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    .review-filter-status {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .review-filter-empty {
      display: none;
      margin: 14px 16px;
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #f7fafc;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .review-filter-empty.visible {
      display: block;
    }

    .review-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .review-link span {
      color: var(--muted);
      font-weight: 700;
    }

    .review-link:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .provenance-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .provenance-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 10px;
      min-width: 0;
    }

    .provenance-card b {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .provenance-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .check-list {
      display: grid;
      gap: 6px;
    }

    .check-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px minmax(90px, .35fr);
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #e9f5ef;
      color: var(--green);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 11px;
    }

    .status-pill.fail {
      background: #fbe9ea;
      color: var(--red);
    }

    .issue-list {
      display: grid;
      gap: 8px;
    }

    .issue {
      border: 1px solid var(--line);
      border-left: 4px solid var(--steel);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    .issue.error { border-left-color: var(--red); }
    .issue.warning { border-left-color: var(--gold); }
    .issue.info { border-left-color: var(--steel); }

    .issue-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .issue-title span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .issue-samples {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .diff-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .diff-row {
      display: contents;
    }

    .diff-row > div {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
    }

    .diff-row > div:last-child {
      border-right: 0;
    }

    .diff-row:last-child > div {
      border-bottom: 0;
    }

    .diff-head > div {
      background: var(--soft);
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 12px;
    }

    .unit-pane {
      padding: 16px;
      border-right: 1px solid var(--line);
    }

    .unit-pane:last-child { border-right: 0; }

    .unit-name {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      border-radius: 4px;
      background: #e8eef4;
      color: #26313d;
      padding: 3px 6px;
      font-size: 12px;
    }

    .weapon-list {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .result-band {
      padding: 14px 16px 0;
      border-top: 1px solid var(--line);
      font-weight: 800;
      color: var(--ink);
    }

    .result-band:first-of-type {
      border-top: 0;
    }

    .weapon {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .weapon-head {
      display: grid;
      grid-template-columns: minmax(160px, 1.4fr) repeat(4, minmax(80px, .7fr));
      gap: 0;
      border-bottom: 1px solid var(--line);
    }

    .weapon-head div {
      padding: 10px;
      border-right: 1px solid var(--line);
    }

    .weapon-head div:last-child { border-right: 0; }

    .weapon-title {
      font-weight: 800;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .bars {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .bar {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 56px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .track {
      height: 8px;
      background: #e6ebf0;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--green);
    }

    .fill.wound { background: var(--gold); }
    .fill.save { background: var(--steel); }

    .notes {
      color: var(--muted);
      font-size: 12px;
      padding: 0 10px 10px;
    }

    .empty {
      padding: 44px 18px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      margin-top: 12px;
      color: var(--red);
      font-weight: 700;
    }

    .battlefield {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .battlefield-toolbar,
    .battlefield-armies,
    .battlefield-panels {
      display: grid;
      gap: 10px;
    }

    .battlefield-toolbar {
      grid-template-columns: minmax(160px, 1fr) repeat(5, auto);
      align-items: end;
    }

    .battlefield-armies,
    .battlefield-panels {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .army-card,
    .battle-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .army-card h3,
    .battle-panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .army-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px 38px;
      gap: 8px;
      align-items: end;
      margin-top: 8px;
    }

    .army-row label {
      margin-top: 0;
    }

    .army-remove {
      min-height: 38px;
      padding: 0;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--red);
    }

    .battlefield-board-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fafc;
      overflow: hidden;
    }

    .battlefield-board {
      width: 100%;
      min-height: 440px;
      display: block;
      touch-action: none;
    }

    .bf-terrain {
      fill: #d5e0cf;
      stroke: #81906f;
      stroke-width: .35;
    }

    .bf-terrain.ruin {
      fill: #d9dde3;
      stroke: #667483;
    }

    .bf-objective {
      fill: rgba(170, 122, 30, .18);
      stroke: var(--gold);
      stroke-width: .45;
    }

    .bf-unit {
      cursor: grab;
      stroke: #fff;
      stroke-width: .55;
    }

    .bf-unit.selected {
      stroke: var(--gold);
      stroke-width: 1.1;
    }

    .bf-unit.red { fill: var(--red); }
    .bf-unit.blue { fill: var(--blue); }
    .bf-unit.destroyed { opacity: .25; }

    .bf-label {
      fill: #111820;
      font-size: 2.4px;
      font-weight: 800;
      pointer-events: none;
      text-anchor: middle;
    }

    .battle-log {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
    }

    .battle-log-entry {
      border-left: 4px solid var(--steel);
      background: var(--soft);
      padding: 8px 10px;
      font-size: 13px;
    }

    .battle-log-entry.red { border-color: var(--red); }
    .battle-log-entry.blue { border-color: var(--blue); }

    .unit-inspector {
      display: grid;
      gap: 8px;
    }

    .inspector-weapons {
      display: grid;
      gap: 5px;
      max-height: 170px;
      overflow: auto;
    }

    .inspector-weapon {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      background: var(--soft);
      font-size: 12px;
    }

    @media (max-width: 840px) {
      main { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .duel { grid-template-columns: 1fr; }
      .unit-pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .unit-pane:last-child { border-bottom: 0; }
      .weapon-head { grid-template-columns: 1fr 1fr; }
      .diff-grid { grid-template-columns: 1fr; }
      .diff-row { display: block; }
      .diff-head { display: none; }
      .diff-row > div { border-right: 0; }
      .provenance-grid { grid-template-columns: 1fr; }
      .check-row { grid-template-columns: 1fr; }
      .combo-menu-head { display: flex; }
      .combo-options { max-height: 220px; }
      .actions { flex-wrap: wrap; }
      .review-tools { grid-template-columns: 1fr; }
      .battlefield-toolbar,
      .battlefield-armies,
      .battlefield-panels { grid-template-columns: 1fr; }
      .battlefield-board { min-height: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>Warhammer 40K Damage Calculator</h1>
      <div class="status" id="status" aria-live="polite">Loading data...</div>
    </div>
  </header>

  <main>
    <aside>
      <h2>Matchup</h2>
      <label for="attacker">Attacker</label>
      <div class="unit-combo" data-field="attacker">
        <div class="combo-row">
          <input id="attacker" data-testid="attacker-input" autocomplete="off" role="combobox" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="attacker-options" aria-expanded="false">
          <button class="combo-toggle" type="button" data-target="attacker" aria-label="Open attacker menu" aria-controls="attacker-options" aria-expanded="false">▼</button>
        </div>
        <div class="combo-menu" id="attacker-menu">
          <div class="combo-menu-head"><span>Choose attacker</span><button class="combo-done" type="button" data-target="attacker">Done</button></div>
          <div class="combo-options" id="attacker-options" role="listbox"></div>
          <div class="combo-footer" id="attacker-menu-count"></div>
        </div>
        <div class="selected-unit-info" id="attacker-selected" data-testid="attacker-selected"></div>
      </div>

      <label for="defender">Defender</label>
      <div class="unit-combo" data-field="defender">
        <div class="combo-row">
          <input id="defender" data-testid="defender-input" autocomplete="off" role="combobox" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="defender-options" aria-expanded="false">
          <button class="combo-toggle" type="button" data-target="defender" aria-label="Open defender menu" aria-controls="defender-options" aria-expanded="false">▼</button>
        </div>
        <div class="combo-menu" id="defender-menu">
          <div class="combo-menu-head"><span>Choose defender</span><button class="combo-done" type="button" data-target="defender">Done</button></div>
          <div class="combo-options" id="defender-options" role="listbox"></div>
          <div class="combo-footer" id="defender-menu-count"></div>
        </div>
        <div class="selected-unit-info" id="defender-selected" data-testid="defender-selected"></div>
      </div>

      <label for="faction">Faction filter</label>
      <select id="faction" data-testid="faction-select">
        <option value="">All factions</option>
      </select>

      <label for="edition">Edition</label>
      <select id="edition" data-testid="edition-select">
        <option value="10e">10th Edition</option>
      </select>

      <label>Mode</label>
      <input id="mode" type="hidden" value="ranged">
      <div class="segmented" role="group" aria-label="Mode">
        <button class="segment active" type="button" data-mode="ranged" data-testid="mode-ranged" aria-pressed="true">Ranged</button>
        <button class="segment" type="button" data-mode="melee" data-testid="mode-melee" aria-pressed="false">Melee</button>
      </div>

      <div class="actions">
        <button id="calculate" type="button" data-testid="calculate-button">Calculate</button>
        <button id="swap" class="secondary" type="button" data-testid="swap-button">Swap</button>
        <button id="battlefield" class="secondary" type="button" data-testid="battlefield-button">Battlefield</button>
        <button id="data-review" class="tertiary" type="button" data-testid="data-review-button">Data Review</button>
      </div>

      <details class="options-group" open>
        <summary>Weapon scope</summary>
        <label for="outgoing-weapon">Attacker weapon</label>
        <select id="outgoing-weapon" data-testid="outgoing-weapon-select">
          <option value="__all__">All matching weapons</option>
        </select>
        <label for="outgoing-multiplier">Attacker weapon count</label>
        <input id="outgoing-multiplier" type="number" min="1" step="1" value="1" data-testid="outgoing-multiplier">

        <label for="incoming-weapon">Return weapon</label>
        <select id="incoming-weapon" data-testid="incoming-weapon-select">
          <option value="__all__">All matching weapons</option>
        </select>
        <label for="incoming-multiplier">Return weapon count</label>
        <input id="incoming-multiplier" type="number" min="1" step="1" value="1" data-testid="incoming-multiplier">
      </details>

      <details class="options-group">
        <summary>Attacker context</summary>
        <label for="attacker-target-model-count">Target models</label>
        <input id="attacker-target-model-count" type="number" min="1" step="1" placeholder="Auto">
        <div class="switches">
          <label class="check"><input id="attacker-moved" type="checkbox"> Attacker moved</label>
          <label class="check"><input id="attacker-advanced" type="checkbox"> Attacker advanced</label>
          <label class="check"><input id="attacker-half-range" type="checkbox"> Target within half range</label>
          <label class="check"><input id="attacker-cover" type="checkbox"> Target in cover</label>
        </div>
      </details>

      <details class="options-group">
        <summary>Return strike context</summary>
        <label for="return-target-model-count">Target models</label>
        <input id="return-target-model-count" type="number" min="1" step="1" placeholder="Auto">
        <div class="switches">
          <label class="check"><input id="return-moved" type="checkbox"> Attacker moved</label>
          <label class="check"><input id="return-advanced" type="checkbox"> Attacker advanced</label>
          <label class="check"><input id="return-half-range" type="checkbox"> Target within half range</label>
          <label class="check"><input id="return-cover" type="checkbox"> Target in cover</label>
        </div>
      </details>
      <div class="error" id="error" aria-live="assertive"></div>
    </aside>

    <section class="results" id="results">
      <div class="empty">Choose two units and calculate a matchup.</div>
    </section>
  </main>

  <script>
    const state = {
      units: [],
      factions: [],
      unitDetails: {},
      selectedUnitIds: { attacker: null, defender: null },
      activeOptionIndex: { attacker: -1, defender: -1 },
      searchTimer: null,
      openMenu: null,
      rulesEdition: "10e",
      supportedRulesEditions: ["10e"],
      availableEditions: [],
      rulesets: {},
      battlefield: {
        templates: [],
        selectedTemplate: "strike_force_44x60",
        redUnitId: null,
        blueUnitId: null,
        redCount: 1,
        blueCount: 1,
        armyRows: { red: [], blue: [] },
        state: null,
        plan: null,
        validation: null,
        dragging: null,
        selectedInstanceId: null,
        selectedUnitDetail: null
      }
    };

    const el = (id) => document.getElementById(id);
    const hasNumber = (value) => value !== null && value !== undefined && value !== "" && Number.isFinite(Number(value));
    const fmt = (value) => hasNumber(value) ? Number(value).toFixed(2) : "n/a";
    const signedFmt = (value) => hasNumber(value) ? `${Number(value) > 0 ? "+" : ""}${Number(value).toFixed(2)}` : "n/a";
    const pct = (value) => `${Math.round(Number(value || 0) * 100)}%`;
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[char]));

    async function api(path, options) {
      const response = await fetch(path, options);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "Request failed");
      return payload;
    }

    async function loadHealth() {
      const health = await api("/api/health");
      const sourceInfo = health.source_info || {};
      state.availableEditions = health.available_editions || [];
      state.rulesets = health.rulesets || {};
      state.mlModels = health.ml_models || {};
      state.rulesEdition = sourceInfo.rules_edition || "10e";
      state.supportedRulesEditions = state.availableEditions.length
        ? state.availableEditions.filter((row) => row.rules_available && row.loaded).map((row) => row.edition)
        : (sourceInfo.supported_rules_editions || [state.rulesEdition]);
      renderEditionSelect();
      setStatus(health.units, sourceInfo, false, state.mlModels, state.rulesets);
    }

    function renderEditionSelect() {
      const select = el("edition");
      const editions = state.supportedRulesEditions.length ? state.supportedRulesEditions : ["10e"];
      select.innerHTML = editions.map((edition) => `<option value="${escapeHtml(edition)}">${editionLabel(edition)}</option>`).join("");
      select.value = editions.includes(state.rulesEdition) ? state.rulesEdition : editions[0];
      select.disabled = editions.length <= 1;
      const discovered = state.availableEditions.length
        ? state.availableEditions.map((row) => editionDiscoveryText(row)).join(" | ")
        : "";
      select.title = discovered || "Only the loaded edition is available for calculation.";
    }

    function editionDiscoveryText(row) {
      const label = row.label || editionLabel(row.edition);
      const status = row.active ? "loaded" : (row.status || (row.rules_available ? "available" : "blocked"));
      const reason = row.unavailable_reason ? `: ${row.unavailable_reason}` : "";
      return `${label}: ${row.units || 0} units (${status}${reason})`;
    }

    function editionLabel(edition) {
      if (edition === "10e") return "10th Edition";
      if (edition === "11e") return "11th Edition";
      return String(edition).toUpperCase();
    }

    function setStatus(unitCount, sourceInfo = {}, locally = false, mlModels = {}, rulesets = {}) {
      const parts = [`${unitCount} units loaded${locally ? " locally" : ""}`];
      if (sourceInfo.rules_edition) parts.push(`${String(sourceInfo.rules_edition).toUpperCase()} rules`);
      if (sourceInfo.commit_short) parts.push(`BSData ${sourceInfo.commit_short}`);
      const mlStatus = mlModels[sourceInfo.rules_edition || state.rulesEdition] || null;
      const ruleset = rulesets[sourceInfo.rules_edition || state.rulesEdition] || null;
      if (mlStatus && mlStatus.available) {
        const accuracy = hasNumber(mlStatus.validation_accuracy)
          ? `${Math.round(Number(mlStatus.validation_accuracy) * 100)}%`
          : "n/a";
        parts.push(`ML ${accuracy}`);
      }
      if (sourceInfo.dirty) parts.push("dirty source");
      if (sourceInfo.generated_at) parts.push(`generated ${sourceInfo.generated_at}`);
      el("status").textContent = parts.join(" | ");
      const titleParts = [];
      if (sourceInfo.remote_origin) titleParts.push(sourceInfo.remote_origin);
      if (sourceInfo.branch) titleParts.push(`branch ${sourceInfo.branch}`);
      if (sourceInfo.commit) titleParts.push(sourceInfo.commit);
      if (ruleset && ruleset.capability_count) {
        const capabilityNames = (ruleset.capabilities || []).map((item) => item.label || item.key).filter(Boolean).slice(0, 8);
        titleParts.push(`Ruleset capabilities ${ruleset.capability_count}: ${capabilityNames.join(", ")}`);
      }
      if (mlStatus && mlStatus.available) {
        titleParts.push(`ML ${mlStatus.model_type || "model"}; feature set ${mlStatus.feature_set || "custom"}; training rows ${mlStatus.training_rows || 0}; feature rows ${mlStatus.feature_rows || 0}; feature hash ${mlStatus.feature_sha256_short || "unknown"}`);
      }
      el("status").title = titleParts.join(" | ");
    }

    async function searchUnits(query = "") {
      const params = new URLSearchParams({
        edition: el("edition").value || state.rulesEdition,
        q: query,
        faction: el("faction").value,
        limit: "400"
      });
      const payload = await api(`/api/units?${params}`);
      if (payload.factions) {
        state.factions = payload.factions;
        renderFactions();
      }
      return payload.units;
    }

    async function loadUnits(query = "") {
      state.units = await searchUnits(query);
      if (state.openMenu) renderDropdown(state.openMenu, state.units);
      return state.units;
    }

    async function loadDataReview() {
      const params = new URLSearchParams({ edition: el("edition").value || state.rulesEdition });
      return api(`/api/data-review?${params}`);
    }

    async function battlefieldPost(path, payload) {
      return api(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ edition: el("edition").value || state.rulesEdition, ...payload })
      });
    }

    async function loadBattlefieldTemplates() {
      if (state.battlefield.templates.length) return state.battlefield.templates;
      const payload = await api("/api/battlefield/templates");
      state.battlefield.templates = payload.templates || [];
      return state.battlefield.templates;
    }

    async function showBattlefield() {
      el("error").textContent = "";
      if (!state.units.length) await loadUnits("");
      await loadBattlefieldTemplates();
      ensureBattlefieldUnitSelections();
      if (!state.battlefield.state) {
        const payload = await battlefieldPost("/api/battlefield/ai-plan", battlefieldRequestPayload({ limit: 5 }));
        state.battlefield.state = payload.state;
        state.battlefield.plan = payload;
      }
      renderBattlefield();
    }

    function ensureBattlefieldUnitSelections() {
      const selectedAttacker = state.selectedUnitIds.attacker;
      const selectedDefender = state.selectedUnitIds.defender;
      const redId = selectedAttacker || state.battlefield.redUnitId || (state.units[0] && state.units[0].id) || null;
      const fallback = state.units.find((unit) => unit.id !== redId);
      const blueId = selectedDefender || state.battlefield.blueUnitId || (fallback && fallback.id) || redId;
      if (!state.battlefield.armyRows.red.length && redId) {
        state.battlefield.armyRows.red = [{ unitId: redId, count: Math.max(1, Number(state.battlefield.redCount || 1)) }];
      }
      if (!state.battlefield.armyRows.blue.length && blueId) {
        state.battlefield.armyRows.blue = [{ unitId: blueId, count: Math.max(1, Number(state.battlefield.blueCount || 1)) }];
      }
      syncLegacyBattlefieldSelections();
    }

    function battlefieldArmyRows(side) {
      ensureBattlefieldRowsObject();
      return state.battlefield.armyRows[side] || [];
    }

    function ensureBattlefieldRowsObject() {
      if (!state.battlefield.armyRows) state.battlefield.armyRows = { red: [], blue: [] };
      if (!Array.isArray(state.battlefield.armyRows.red)) state.battlefield.armyRows.red = [];
      if (!Array.isArray(state.battlefield.armyRows.blue)) state.battlefield.armyRows.blue = [];
    }

    function syncLegacyBattlefieldSelections() {
      const red = battlefieldArmyRows("red")[0] || {};
      const blue = battlefieldArmyRows("blue")[0] || {};
      state.battlefield.redUnitId = red.unitId || null;
      state.battlefield.blueUnitId = blue.unitId || null;
      state.battlefield.redCount = Math.max(1, Number(red.count || 1));
      state.battlefield.blueCount = Math.max(1, Number(blue.count || 1));
    }

    function battlefieldArmies() {
      ensureBattlefieldUnitSelections();
      return [
        { id: "red", name: "Red Army", side: "red", units: battlefieldArmyRows("red").filter((row) => row.unitId).map((row) => ({ unit_id: row.unitId, count: Math.max(1, Number(row.count || 1)) })) },
        { id: "blue", name: "Blue Army", side: "blue", units: battlefieldArmyRows("blue").filter((row) => row.unitId).map((row) => ({ unit_id: row.unitId, count: Math.max(1, Number(row.count || 1)) })) }
      ];
    }

    function battlefieldRequestPayload(extra = {}) {
      const payload = { template_id: state.battlefield.selectedTemplate, armies: battlefieldArmies(), ...extra };
      if (state.battlefield.state) payload.state = state.battlefield.state;
      return payload;
    }

    async function battlefieldGenerate() {
      state.battlefield.state = null;
      state.battlefield.plan = await battlefieldPost("/api/battlefield/ai-plan", battlefieldRequestPayload({ limit: 5 }));
      state.battlefield.state = state.battlefield.plan.state;
      renderBattlefield();
    }

    async function battlefieldValidate() {
      const red = await battlefieldPost("/api/army/validate", { army: battlefieldArmies()[0] });
      const blue = await battlefieldPost("/api/army/validate", { army: battlefieldArmies()[1] });
      const stateValidation = await battlefieldPost("/api/battlefield/state/validate", battlefieldRequestPayload());
      state.battlefield.validation = { red, blue, state: stateValidation };
      renderBattlefield();
    }

    async function battlefieldSuggest() {
      state.battlefield.plan = await battlefieldPost("/api/battlefield/ai-plan", battlefieldRequestPayload({ limit: 6 }));
      state.battlefield.state = state.battlefield.plan.state;
      renderBattlefield();
    }

    async function battlefieldAutoplay() {
      const payload = await battlefieldPost("/api/battlefield/autoplay", battlefieldRequestPayload());
      state.battlefield.state = payload.state;
      state.battlefield.plan = null;
      renderBattlefield(payload.replay || []);
    }

    async function battlefieldResolvePlannedAction(index) {
      const action = state.battlefield.plan && state.battlefield.plan.actions
        ? state.battlefield.plan.actions[Number(index)]
        : null;
      if (!action) throw new Error("No planned action found.");
      const payload = await battlefieldPost("/api/battlefield/resolve", battlefieldRequestPayload({ action }));
      state.battlefield.state = payload.state;
      state.battlefield.plan = null;
      renderBattlefield(payload.outcome ? [{ outcome: payload.outcome.log_entry, chosen: payload.outcome.action }] : []);
    }

    function battlefieldExportJson() {
      const payload = {
        format: "battle_state_v1",
        template_id: state.battlefield.selectedTemplate,
        armies: battlefieldArmies(),
        state: state.battlefield.state,
        exported_at: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `battlefield-state-${Date.now()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    }

    async function battlefieldImportJson(file) {
      const text = await file.text();
      const payload = JSON.parse(text);
      const importedState = payload.state || payload;
      if (!importedState || !importedState.map || !Array.isArray(importedState.units)) {
        throw new Error("Battlefield import must contain a battle_state_v1 state object.");
      }
      state.battlefield.state = importedState;
      state.battlefield.selectedTemplate = importedState.map.id || payload.template_id || state.battlefield.selectedTemplate;
      const armies = payload.armies || importedState.armies || [];
      const red = armies.find((army) => army.side === "red");
      const blue = armies.find((army) => army.side === "blue");
      state.battlefield.armyRows = {
        red: red && red.units ? red.units.map((row) => ({ unitId: row.unit_id, count: Math.max(1, Number(row.count || 1)) })) : [],
        blue: blue && blue.units ? blue.units.map((row) => ({ unitId: row.unit_id, count: Math.max(1, Number(row.count || 1)) })) : []
      };
      syncLegacyBattlefieldSelections();
      state.battlefield.plan = null;
      state.battlefield.validation = null;
      state.battlefield.selectedInstanceId = null;
      state.battlefield.selectedUnitDetail = null;
      renderBattlefield();
    }

    function renderBattlefield(replay = null) {
      const battleState = state.battlefield.state;
      const templates = state.battlefield.templates;
      el("results").innerHTML = `
        <div class="battlefield" data-testid="battlefield-view">
          <div class="battlefield-toolbar">
            <div>
              <label for="battle-template">Map template</label>
              <select id="battle-template">${templates.map((template) => `<option value="${escapeHtml(template.id)}">${escapeHtml(template.name)}</option>`).join("")}</select>
            </div>
            <button id="battle-generate" type="button">Generate map</button>
            <button id="battle-suggest" class="secondary" type="button">Suggest AI action</button>
            <button id="battle-autoplay" class="secondary" type="button">Run one AI turn</button>
            <button id="battle-export" class="tertiary" type="button">Export JSON</button>
            <button id="battle-import" class="tertiary" type="button">Import JSON</button>
            <input id="battle-import-file" type="file" accept="application/json,.json" hidden>
          </div>
          <div class="battlefield-armies">
            ${renderArmyBuilder("red", battlefieldArmyRows("red"))}
            ${renderArmyBuilder("blue", battlefieldArmyRows("blue"))}
          </div>
          <button id="battle-validate" class="tertiary" type="button">Validate armies and state</button>
          ${battleState ? renderBattleBoard(battleState) : `<div class="empty">Generate a battlefield to place units.</div>`}
          <div class="battlefield-panels">
            <div class="battle-panel">
              <h3>Selected unit</h3>
              ${renderSelectedBattleUnit(battleState)}
            </div>
            <div class="battle-panel">
              <h3>AI planner</h3>
              ${renderBattlePlan(state.battlefield.plan)}
            </div>
            <div class="battle-panel">
              <h3>Battle log</h3>
              ${renderBattleLog(battleState, replay)}
            </div>
          </div>
          ${renderBattleValidation(state.battlefield.validation)}
        </div>
      `;
      el("battle-template").value = state.battlefield.selectedTemplate;
      wireBattlefieldEvents();
    }

    function renderArmyBuilder(side, rows) {
      const label = side === "red" ? "Red army" : "Blue army";
      const armyRows = rows.length ? rows : [{ unitId: "", count: 1 }];
      return `
        <div class="army-card ${side}">
          <h3>${label}</h3>
          ${armyRows.map((row, index) => renderArmyRow(side, row, index)).join("")}
          <button class="tertiary battle-add-unit" type="button" data-side="${side}">Add unit</button>
          <div class="small">${escapeHtml(armySummaryText(armyRows))}</div>
        </div>
      `;
    }

    function renderArmyRow(side, row, index) {
      return `
        <div class="army-row" data-side="${side}" data-index="${index}">
          <div>
            <label for="battle-${side}-unit-${index}">Unit ${index + 1}</label>
            <select id="battle-${side}-unit-${index}" class="battle-army-unit" data-side="${side}" data-index="${index}">
              <option value="">Choose unit</option>
              ${state.units.map((unit) => `<option value="${escapeHtml(unit.id || "")}">${escapeHtml(unit.name)}${unit.points ? ` (${unit.points} pts)` : ""}</option>`).join("")}
            </select>
          </div>
          <div>
            <label for="battle-${side}-count-${index}">Copies</label>
            <input id="battle-${side}-count-${index}" class="battle-army-count" data-side="${side}" data-index="${index}" type="number" min="1" max="12" step="1" value="${Math.max(1, Number(row.count || 1))}">
          </div>
          <button class="army-remove" type="button" data-side="${side}" data-index="${index}" aria-label="Remove unit row">X</button>
        </div>
      `;
    }

    function renderBattleBoard(battleState) {
      const battleMap = battleState.map;
      const viewBox = `0 0 ${battleMap.width} ${battleMap.height}`;
      const terrain = (battleMap.terrain || []).map((feature) => `
        <rect class="bf-terrain ${escapeHtml(feature.type)}" x="${feature.x}" y="${feature.y}" width="${feature.width}" height="${feature.height}">
          <title>${escapeHtml(feature.name)}: ${feature.grants_cover ? "cover" : "no cover"}</title>
        </rect>
      `).join("");
      const objectives = (battleMap.objectives || []).map((objective) => `
        <circle class="bf-objective" cx="${objective.x}" cy="${objective.y}" r="${objective.radius}">
          <title>${escapeHtml(objective.name)} objective</title>
        </circle>
      `).join("");
      const units = (battleState.units || []).map((unit) => `
        <g data-unit-id="${escapeHtml(unit.instance_id)}">
          <circle class="bf-unit ${escapeHtml(unit.side)} ${(unit.status_flags || []).includes("destroyed") ? "destroyed" : ""} ${state.battlefield.selectedInstanceId === unit.instance_id ? "selected" : ""}" cx="${unit.x}" cy="${unit.y}" r="${unit.radius}" data-unit-id="${escapeHtml(unit.instance_id)}">
            <title>${escapeHtml(unit.name)}: ${unit.models_remaining} models, ${fmt(unit.wounds_remaining)} wounds</title>
          </circle>
          <text class="bf-label" x="${unit.x}" y="${Number(unit.y) + Number(unit.radius) + 2.8}">${escapeHtml(shortUnitLabel(unit.name))}</text>
        </g>
      `).join("");
      return `
        <div class="battlefield-board-wrap">
          <svg class="battlefield-board" id="battle-board" viewBox="${viewBox}" data-width="${battleMap.width}" data-height="${battleMap.height}" role="img" aria-label="${escapeHtml(battleMap.name)} battlefield">
            <rect x="0" y="0" width="${battleMap.width}" height="${battleMap.height}" fill="#f7fafc"></rect>
            ${terrain}
            ${objectives}
            ${units}
          </svg>
        </div>
        <div class="small">Score: Red ${battleState.score?.red || 0} | Blue ${battleState.score?.blue || 0}. Drag unit blobs to adjust the current state before asking the AI.</div>
      `;
    }

    function renderBattlePlan(plan) {
      const actions = (plan && plan.actions) || [];
      if (!actions.length) return `<div class="empty">No AI actions available yet.</div>`;
      return `<div class="battle-log">${actions.map((action, index) => `
        <div class="battle-log-entry ${escapeHtml(action.side)}">
          <b>${escapeHtml(action.type)}: ${escapeHtml(unitNameByInstance(action.actor_id))}</b><br>
          ${escapeHtml(action.reason)}<br>
          <span class="small">Score ${fmt(action.score)} | Damage ${fmt(action.expected_damage)} | Return ${fmt(action.expected_return_damage)}</span>
          <div><button class="tertiary battle-resolve-action" type="button" data-action-index="${index}">Resolve this action</button></div>
        </div>
      `).join("")}</div>`;
    }

    function renderSelectedBattleUnit(battleState) {
      if (!battleState || !state.battlefield.selectedInstanceId) {
        return `<div class="empty">Select a unit blob on the board.</div>`;
      }
      const unit = battleUnitByInstance(state.battlefield.selectedInstanceId);
      if (!unit) return `<div class="empty">Selected unit is no longer on the board.</div>`;
      const detail = state.battlefield.selectedUnitDetail;
      const profile = detail || state.units.find((row) => row.id === unit.unit_id) || {};
      const nearestEnemy = nearestBattleUnit(unit, (battleState.units || []).filter((row) => row.side !== unit.side && row.models_remaining > 0));
      const nearestObjective = nearestBattleObjective(battleState, unit);
      const weapons = (profile.weapons || []).slice(0, 8).map((weapon) => `
        <div class="inspector-weapon">
          <b>${escapeHtml(weapon.name)}</b><br>
          ${escapeHtml(weapon.type || "")} | A${escapeHtml(weapon.attacks || "?")} | ${escapeHtml(weapon.skill || "?")} | S${escapeHtml(weapon.strength || "?")} | AP${escapeHtml(weapon.ap ?? 0)} | D${escapeHtml(weapon.damage || "?")}
        </div>
      `).join("");
      return `
        <div class="unit-inspector" data-testid="battle-unit-inspector">
          <div><b>${escapeHtml(unit.name)}</b> <span class="small">${escapeHtml(unit.side)}</span></div>
          <div class="small">${escapeHtml(profile.faction || "No faction")} | T${escapeHtml(profile.toughness || "?")} W${escapeHtml(profile.wounds || "?")} Sv ${escapeHtml(profile.save || "?")} | OC ${escapeHtml(profile.objective_control ?? profile.objectiveControl ?? "?")} | ${escapeHtml(profile.points || 0)} pts</div>
          <div class="small">Board: x ${fmt(unit.x)}, y ${fmt(unit.y)} | Models ${escapeHtml(unit.models_remaining)} | Wounds remaining ${fmt(unit.wounds_remaining)}</div>
          <div class="small">Nearest enemy: ${nearestEnemy ? `${escapeHtml(nearestEnemy.name)} at ${fmt(nearestEnemy.distance)}"` : "none"}</div>
          <div class="small">Nearest objective: ${nearestObjective ? `${escapeHtml(nearestObjective.name)} at ${fmt(distance(unit.x, unit.y, nearestObjective.x, nearestObjective.y))}"` : "none"}</div>
          <div class="inspector-weapons">${weapons || `<div class="empty">Weapon details not loaded.</div>`}</div>
        </div>
      `;
    }

    function renderBattleLog(battleState, replay) {
      const entries = replay
        ? replay.map((row) => row.outcome)
        : ((battleState && battleState.log) || []);
      if (!entries.length) return `<div class="empty">No actions resolved yet.</div>`;
      return `<div class="battle-log">${entries.slice(-12).reverse().map((entry) => `
        <div class="battle-log-entry ${escapeHtml(entry.side || "")}">
          <b>Turn ${entry.turn || "?"}: ${escapeHtml(entry.actor || entry.side || "Battlefield")} ${escapeHtml(entry.action || "")}</b><br>
          ${escapeHtml(entry.reason || entry.detail || "")}
          ${hasNumber(entry.damage) ? `<br><span class="small">Damage ${fmt(entry.damage)}${hasNumber(entry.points_removed) ? ` | Points removed ${fmt(entry.points_removed)}` : ""}</span>` : ""}
        </div>
      `).join("")}</div>`;
    }

    function renderBattleValidation(validation) {
      if (!validation) return "";
      const blocks = ["red", "blue", "state"].map((key) => {
        const row = validation[key] || {};
        const warnings = (row.warnings || []).map((warning) => `<li>${escapeHtml(warning)}</li>`).join("");
        const errors = (row.errors || []).map((error) => `<li>${escapeHtml(error)}</li>`).join("");
        return `<div class="battle-panel"><h3>${escapeHtml(key)} validation</h3><div class="small">${row.ok ? "Valid" : "Needs attention"}</div><ul>${errors}${warnings}</ul></div>`;
      }).join("");
      return `<div class="battlefield-panels">${blocks}</div>`;
    }

    function wireBattlefieldEvents() {
      el("battle-template").addEventListener("change", (event) => {
        state.battlefield.selectedTemplate = event.target.value;
        state.battlefield.state = null;
      });
      document.querySelectorAll(".battle-army-unit").forEach((select) => {
        const rows = battlefieldArmyRows(select.dataset.side);
        const row = rows[Number(select.dataset.index)] || {};
        select.value = row.unitId || "";
        select.addEventListener("change", (event) => {
          updateBattlefieldArmyRow(event.target.dataset.side, Number(event.target.dataset.index), { unitId: event.target.value });
        });
      });
      document.querySelectorAll(".battle-army-count").forEach((input) => {
        input.addEventListener("change", (event) => {
          updateBattlefieldArmyRow(event.target.dataset.side, Number(event.target.dataset.index), { count: Math.max(1, Number(event.target.value || 1)) });
        });
      });
      document.querySelectorAll(".army-remove").forEach((button) => {
        button.addEventListener("click", () => removeBattlefieldArmyRow(button.dataset.side, Number(button.dataset.index)));
      });
      document.querySelectorAll(".battle-add-unit").forEach((button) => {
        button.addEventListener("click", () => addBattlefieldArmyRow(button.dataset.side));
      });
      el("battle-generate").addEventListener("click", () => battlefieldGenerate().catch(showBattlefieldError));
      el("battle-validate").addEventListener("click", () => battlefieldValidate().catch(showBattlefieldError));
      el("battle-suggest").addEventListener("click", () => battlefieldSuggest().catch(showBattlefieldError));
      el("battle-autoplay").addEventListener("click", () => battlefieldAutoplay().catch(showBattlefieldError));
      document.querySelectorAll(".battle-resolve-action").forEach((button) => {
        button.addEventListener("click", () => battlefieldResolvePlannedAction(button.dataset.actionIndex).catch(showBattlefieldError));
      });
      el("battle-export").addEventListener("click", battlefieldExportJson);
      el("battle-import").addEventListener("click", () => el("battle-import-file").click());
      el("battle-import-file").addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (file) battlefieldImportJson(file).catch(showBattlefieldError);
        event.target.value = "";
      });
      wireBattleBoardDrag();
    }

    function updateBattlefieldArmyRow(side, index, patch) {
      const rows = battlefieldArmyRows(side);
      rows[index] = { ...(rows[index] || { unitId: "", count: 1 }), ...patch };
      rows[index].count = Math.max(1, Number(rows[index].count || 1));
      state.battlefield.state = null;
      state.battlefield.plan = null;
      syncLegacyBattlefieldSelections();
      renderBattlefield();
    }

    function addBattlefieldArmyRow(side) {
      const rows = battlefieldArmyRows(side);
      const fallback = state.units.find((unit) => !rows.some((row) => row.unitId === unit.id)) || state.units[0];
      rows.push({ unitId: fallback ? fallback.id : "", count: 1 });
      state.battlefield.state = null;
      state.battlefield.plan = null;
      syncLegacyBattlefieldSelections();
      renderBattlefield();
    }

    function removeBattlefieldArmyRow(side, index) {
      const rows = battlefieldArmyRows(side);
      rows.splice(index, 1);
      if (!rows.length) rows.push({ unitId: "", count: 1 });
      state.battlefield.state = null;
      state.battlefield.plan = null;
      syncLegacyBattlefieldSelections();
      renderBattlefield();
    }

    function wireBattleBoardDrag() {
      const board = el("battle-board");
      if (!board) return;
      board.querySelectorAll(".bf-unit").forEach((node) => {
        node.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          node.setPointerCapture(event.pointerId);
          state.battlefield.dragging = node.dataset.unitId;
        });
        node.addEventListener("click", () => {
          selectBattleUnit(node.dataset.unitId).catch(showBattlefieldError);
        });
        node.addEventListener("pointermove", (event) => {
          if (state.battlefield.dragging !== node.dataset.unitId) return;
          const point = svgPoint(board, event.clientX, event.clientY);
          updateBattleUnitPosition(node.dataset.unitId, point.x, point.y);
          node.setAttribute("cx", point.x);
          node.setAttribute("cy", point.y);
          const label = board.querySelector(`g[data-unit-id="${CSS.escape(node.dataset.unitId)}"] .bf-label`);
          const unit = battleUnitByInstance(node.dataset.unitId);
          if (label && unit) {
            label.setAttribute("x", unit.x);
            label.setAttribute("y", Number(unit.y) + Number(unit.radius) + 2.8);
          }
        });
        node.addEventListener("pointerup", () => {
          state.battlefield.dragging = null;
          state.battlefield.plan = null;
        });
      });
    }

    async function selectBattleUnit(instanceId) {
      const unit = battleUnitByInstance(instanceId);
      if (!unit) return;
      state.battlefield.selectedInstanceId = instanceId;
      state.battlefield.selectedUnitDetail = await loadUnitDetailById(unit.unit_id, unit.name);
      renderBattlefield();
    }

    function svgPoint(svg, clientX, clientY) {
      const rect = svg.getBoundingClientRect();
      const width = Number(svg.dataset.width || 44);
      const height = Number(svg.dataset.height || 60);
      return {
        x: Math.max(0, Math.min(width, ((clientX - rect.left) / rect.width) * width)),
        y: Math.max(0, Math.min(height, ((clientY - rect.top) / rect.height) * height))
      };
    }

    function distance(x1, y1, x2, y2) {
      return Math.hypot(Number(x2) - Number(x1), Number(y2) - Number(y1));
    }

    function updateBattleUnitPosition(instanceId, x, y) {
      const unit = battleUnitByInstance(instanceId);
      const battleMap = state.battlefield.state && state.battlefield.state.map;
      if (!unit || !battleMap) return;
      unit.x = Math.max(unit.radius, Math.min(Number(battleMap.width) - unit.radius, Number(x)));
      unit.y = Math.max(unit.radius, Math.min(Number(battleMap.height) - unit.radius, Number(y)));
    }

    function battleUnitByInstance(instanceId) {
      return state.battlefield.state && (state.battlefield.state.units || []).find((unit) => unit.instance_id === instanceId);
    }

    function unitNameByInstance(instanceId) {
      const unit = battleUnitByInstance(instanceId);
      return unit ? unit.name : instanceId;
    }

    function nearestBattleUnit(unit, candidates) {
      const nearest = candidates
        .map((candidate) => ({ ...candidate, distance: distance(unit.x, unit.y, candidate.x, candidate.y) }))
        .sort((left, right) => left.distance - right.distance)[0];
      return nearest || null;
    }

    function nearestBattleObjective(battleState, unit) {
      return ((battleState && battleState.map && battleState.map.objectives) || [])
        .slice()
        .sort((left, right) => distance(unit.x, unit.y, left.x, left.y) - distance(unit.x, unit.y, right.x, right.y))[0] || null;
    }

    function unitLabelById(unitId) {
      const unit = state.units.find((row) => row.id === unitId);
      if (!unit) return "No unit selected.";
      const parts = [unit.faction, unit.points ? `${unit.points} pts` : "", unit.models_min ? `${unit.models_min}-${unit.models_max || unit.models_min} models` : ""].filter(Boolean);
      return parts.join(" | ");
    }

    function armySummaryText(rows) {
      const selectedRows = rows.filter((row) => row.unitId);
      const unitTotal = selectedRows.reduce((sum, row) => sum + Math.max(1, Number(row.count || 1)), 0);
      const points = selectedRows.reduce((sum, row) => {
        const unit = state.units.find((candidate) => candidate.id === row.unitId);
        return sum + (unit && unit.points ? Number(unit.points) * Math.max(1, Number(row.count || 1)) : 0);
      }, 0);
      return `${unitTotal} battlefield units | ${points} pts before unsupported options`;
    }

    function shortUnitLabel(name) {
      return String(name || "Unit").split(/\s+/).slice(0, 2).join(" ");
    }

    function showBattlefieldError(error) {
      el("error").textContent = error.message;
    }

    async function loadUnitDetail(name, field = null) {
      const unitName = String(name || "").trim();
      if (!unitName) return null;
      const selectedId = field && state.selectedUnitIds[field] && el(field).value.trim() === unitName
        ? state.selectedUnitIds[field]
        : null;
      const key = selectedId || unitName.toLowerCase();
      if (state.unitDetails[key]) return state.unitDetails[key];
      const params = new URLSearchParams({ edition: el("edition").value || state.rulesEdition });
      if (selectedId) params.set("id", selectedId);
      else params.set("name", unitName);
      const query = params.toString();
      const payload = await api(`/api/unit?${query}`);
      state.unitDetails[key] = payload.unit;
      return payload.unit;
    }

    async function loadUnitDetailById(unitId, name = "") {
      const key = unitId || String(name || "").toLowerCase();
      if (!key) return null;
      if (state.unitDetails[key]) return state.unitDetails[key];
      const params = new URLSearchParams({ edition: el("edition").value || state.rulesEdition });
      if (unitId) params.set("id", unitId);
      else params.set("name", name);
      const payload = await api(`/api/unit?${params}`);
      state.unitDetails[key] = payload.unit;
      return payload.unit;
    }

    function renderFactions() {
      const select = el("faction");
      const current = select.value;
      select.innerHTML = `<option value="">All factions</option>`;
      for (const faction of state.factions) {
        const option = document.createElement("option");
        option.value = faction;
        option.textContent = faction;
        select.appendChild(option);
      }
      select.value = state.factions.includes(current) ? current : "";
    }

    function queueUnitSearch(value = "") {
      window.clearTimeout(state.searchTimer);
      state.searchTimer = window.setTimeout(() => {
        loadUnits(value).catch((error) => {
          el("error").textContent = error.message;
        });
      }, 120);
    }

    function optionSubtitle(unit) {
      const parts = [];
      if (unit.faction) parts.push(unit.faction);
      if (unit.points) parts.push(`${unit.points} pts`);
      parts.push(`T${unit.toughness} W${unit.wounds} Sv ${unit.save}`);
      return parts.join(" | ");
    }

    function selectedUnit(field) {
      const unitName = el(field).value.trim();
      if (!unitName) return null;
      const selectedId = state.selectedUnitIds[field];
      if (selectedId) {
        const byId = state.units.find((unit) => unit.id === selectedId);
        if (byId) return byId;
        const cached = state.unitDetails[selectedId];
        if (cached) return cached;
      }
      return state.units.find((unit) => unit.name === unitName) || null;
    }

    function unitVariantLabel(unit) {
      if (!unit) return "";
      const modelRange = unitModelRange(unit);
      const parts = [];
      if (unit.faction) parts.push(unit.faction);
      if (unit.points) parts.push(`${unit.points} pts`);
      parts.push(`Models ${modelRange}`);
      return parts.join(" | ");
    }

    function unitModelRange(unit) {
      const min = unit.models_min ?? unit.modelsMin;
      const max = unit.models_max ?? unit.modelsMax;
      return min && max && min !== max ? `${min}-${max}` : (min || max || "unknown");
    }

    function unitSourceFile(unit) {
      return unit ? (unit.source_file || unit.sourceFile || "") : "";
    }

    function unitAuditLabel(unit) {
      if (!unit) return "";
      const sourceFile = unitSourceFile(unit);
      const parts = [];
      if (sourceFile) parts.push(`Source ${sourceFile}`);
      if (unit.id) parts.push(`ID ${unit.id}`);
      return parts.join(" | ");
    }

    function updateSelectedUnitInfo(field) {
      const target = el(`${field}-selected`);
      const unit = selectedUnit(field);
      if (!unit) {
        target.textContent = "";
        return;
      }
      const audit = unitAuditLabel(unit);
      target.innerHTML = `${escapeHtml(unitVariantLabel(unit))}${audit ? ` <details><summary>Details</summary><span>${escapeHtml(audit)}</span></details>` : ""}`;
    }

    function updateSelectedUnitInfos() {
      updateSelectedUnitInfo("attacker");
      updateSelectedUnitInfo("defender");
    }

    function closeDropdown(field = state.openMenu) {
      if (!field) return;
      el(`${field}-menu`).classList.remove("open");
      el(`${field}-menu`).closest(".unit-combo")?.classList.remove("menu-open");
      el(field).setAttribute("aria-expanded", "false");
      document.querySelector(`.combo-toggle[data-target="${field}"]`)?.setAttribute("aria-expanded", "false");
      el(field).removeAttribute("aria-activedescendant");
      state.activeOptionIndex[field] = -1;
      if (state.openMenu === field) state.openMenu = null;
    }

    function dropdownOptions(field) {
      return [...el(`${field}-options`).querySelectorAll(".combo-option:not([aria-disabled='true'])")];
    }

    function setActiveOption(field, index) {
      const options = dropdownOptions(field);
      if (!options.length) {
        state.activeOptionIndex[field] = -1;
        el(field).removeAttribute("aria-activedescendant");
        return;
      }
      const bounded = Math.max(0, Math.min(options.length - 1, index));
      state.activeOptionIndex[field] = bounded;
      options.forEach((option, optionIndex) => {
        const active = optionIndex === bounded;
        option.classList.toggle("active", active);
        option.setAttribute("aria-selected", active ? "true" : "false");
      });
      el(field).setAttribute("aria-activedescendant", options[bounded].id);
      options[bounded].scrollIntoView({ block: "nearest" });
    }

    function selectDropdownOption(field, button) {
      el(field).value = button.dataset.unit;
      state.selectedUnitIds[field] = button.dataset.unitId || null;
      updateSelectedUnitInfo(field);
      closeDropdown(field);
      refreshWeaponSelectors().catch((error) => {
        el("error").textContent = error.message;
      });
    }

    function renderDropdown(field, units) {
      const menu = el(`${field}-options`);
      const rows = units.slice(0, 80);
      const count = el(`${field}-menu-count`);
      if (count) {
        count.textContent = units.length > rows.length
          ? `Showing first ${rows.length} of ${units.length} matches. Type to narrow.`
          : `${units.length} matching ${units.length === 1 ? "unit" : "units"}`;
      }
      if (!rows.length) {
        menu.innerHTML = `<div class="combo-option" role="option" aria-disabled="true">No matching units</div>`;
        return;
      }
      menu.innerHTML = rows.map((unit, index) => `
        <div class="combo-option" id="${field}-option-${index}" role="option" aria-selected="false" tabindex="-1" data-unit="${escapeHtml(unit.name)}" data-unit-id="${escapeHtml(unit.id || "")}">
          ${escapeHtml(unit.name)}
          <span>${escapeHtml(optionSubtitle(unit))}</span>
        </div>
      `).join("");
      menu.querySelectorAll(".combo-option").forEach((option) => {
        option.addEventListener("mousedown", (event) => {
          event.preventDefault();
          selectDropdownOption(field, option);
        });
      });
      const selectedIndex = rows.findIndex((unit) => unit.id && unit.id === state.selectedUnitIds[field]);
      setActiveOption(field, selectedIndex >= 0 ? selectedIndex : 0);
    }

    async function refreshWeaponSelectors() {
      await Promise.all([
        populateWeaponSelect("outgoing-weapon", "attacker", el("attacker").value, el("mode").value),
        populateWeaponSelect("incoming-weapon", "defender", el("defender").value, el("mode").value)
      ]);
    }

    async function populateWeaponSelect(selectId, field, unitName, mode) {
      const select = el(selectId);
      const previous = select.value;
      select.innerHTML = `<option value="__all__">All matching weapons</option>`;
      const unit = await loadUnitDetail(unitName, field);
      if (!unit) {
        select.disabled = true;
        return;
      }
      const seen = new Set();
      const weapons = (unit.weapons || []).filter((weapon) => {
        if (weapon.type !== mode || seen.has(weapon.name)) return false;
        seen.add(weapon.name);
        return true;
      });
      for (const weapon of weapons) {
        const option = document.createElement("option");
        option.value = weapon.name;
        option.textContent = `${weapon.name} | A${weapon.attacks} ${weapon.skill} S${weapon.strength} AP${weapon.ap} D${weapon.damage}`;
        select.appendChild(option);
      }
      select.disabled = weapons.length === 0;
      select.value = [...select.options].some((option) => option.value === previous) ? previous : "__all__";
    }

    async function openDropdown(field) {
      if (state.openMenu && state.openMenu !== field) closeDropdown(state.openMenu);
      state.openMenu = field;
      el(field).setAttribute("aria-expanded", "true");
      document.querySelector(`.combo-toggle[data-target="${field}"]`)?.setAttribute("aria-expanded", "true");
      el(`${field}-menu`).closest(".unit-combo")?.classList.add("menu-open");
      const units = await searchUnits(el(field).value);
      state.units = units;
      renderDropdown(field, units);
      el(`${field}-menu`).classList.add("open");
    }

    function contextPayload(prefix = "") {
      const targetModelCount = el(`${prefix}target-model-count`).value.trim();
      return {
        attacker_moved: el(`${prefix}moved`).checked,
        attacker_advanced: el(`${prefix}advanced`).checked,
        target_within_half_range: el(`${prefix}half-range`).checked,
        target_in_cover: el(`${prefix}cover`).checked,
        target_model_count: targetModelCount ? Number(targetModelCount) : null
      };
    }

    async function calculate() {
      el("error").textContent = "";
      closeDropdown();
      if (!el("attacker").value.trim() || !el("defender").value.trim()) {
        el("error").textContent = "Choose both units.";
        return;
      }
      const button = el("calculate");
      button.disabled = true;
      try {
        const payload = await api("/api/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            attacker: el("attacker").value,
            attacker_id: state.selectedUnitIds.attacker,
            defender: el("defender").value,
            defender_id: state.selectedUnitIds.defender,
            edition: el("edition").value || state.rulesEdition,
            mode: el("mode").value,
            outgoing_weapon: el("outgoing-weapon").value,
            incoming_weapon: el("incoming-weapon").value,
            outgoing_multiplier: Number(el("outgoing-multiplier").value || 1),
            incoming_multiplier: Number(el("incoming-multiplier").value || 1),
            outgoing_context: contextPayload("attacker-"),
            incoming_context: contextPayload("return-")
          })
        });
        renderResults(payload);
        if (window.matchMedia("(max-width: 840px)").matches) {
          el("results").scrollIntoView({ behavior: "smooth", block: "start" });

    function loadoutWarnings(payload) {
      const filters = payload.weapon_filters || {};
      const rows = [];
      const outgoingCount = payload.outgoing && payload.outgoing.weapons ? payload.outgoing.weapons.length : 0;
      const incomingCount = payload.incoming && payload.incoming.weapons ? payload.incoming.weapons.length : 0;
      if (!filters.outgoing && outgoingCount >= 8) {
        rows.push(`${payload.attacker.name} attack includes ${outgoingCount} imported ${payload.mode} weapon profiles. Select specific weapons for a real loadout.`);
      }
      if (!filters.incoming && incomingCount >= 8) {
        rows.push(`${payload.defender.name} return strike includes ${incomingCount} imported ${payload.mode} weapon profiles. Select specific weapons for a real loadout.`);
      }
      return rows;
    }

    function renderLoadoutWarnings(payload) {
      const warnings = loadoutWarnings(payload);
      if (!warnings.length) return "";
      return `<div class="loadout-warning">${warnings.map(escapeHtml).join("<br>")}</div>`;
    }

    function matchupJudgement(payload) {
      if (payload.judgement) return payload.judgement;
      const hasPoints = hasNumber(payload.outgoing.estimated_points_removed) && hasNumber(payload.incoming.estimated_points_removed);
      const outgoingPoints = hasPoints ? Number(payload.outgoing.estimated_points_removed) : 0;
      const incomingPoints = hasPoints ? Number(payload.incoming.estimated_points_removed) : 0;
      const outgoing = hasPoints ? outgoingPoints : (payload.outgoing.total_damage || 0);
      const incoming = hasPoints ? incomingPoints : (payload.incoming.total_damage || 0);
      const attacker = payload.attacker;
      const defender = payload.defender;
      const basisLabel = hasPoints ? "estimated points removed" : "expected damage";
      const delta = outgoing - incoming;
      const total = Math.max(outgoing + incoming, 0.01);
      const edge = Math.abs(delta) / total;
      const winner = delta >= 0 ? attacker.name : defender.name;
      let confidence = "narrow";
      if (edge >= 0.45) confidence = "decisive";
      else if (edge >= 0.22) confidence = "clear";
      const loserScore = delta >= 0 ? incoming : outgoing;
      const winnerScore = delta >= 0 ? outgoing : incoming;
      const reason = hasPoints
        ? `${winner} is favored on estimated points removed, scoring ${fmt(winnerScore)} while giving up ${fmt(loserScore)} in return.`
        : `${winner} is projected to deal ${fmt(winnerScore)} damage while taking ${fmt(loserScore)} in the return strike.`;
      const efficiency = attacker.points && defender.points
        ? ` Points context: ${attacker.name} is ${attacker.points} pts and ${defender.name} is ${defender.points} pts.`
        : "";
      const damageContext = hasPoints
        ? ` Damage context: ${attacker.name} deals ${fmt(payload.outgoing.total_damage)} and ${defender.name} returns ${fmt(payload.incoming.total_damage)}.`
        : "";
      return {
        title: edge < 0.08 ? "AI judgement: too close to call" : `AI judgement: ${winner} favored (${confidence})`,
        body: edge < 0.08
          ? `The exchange is nearly even on ${basisLabel}: ${attacker.name} scores ${fmt(outgoing)} and ${defender.name} returns ${fmt(incoming)}.${hasPoints ? damageContext : efficiency}`
          : `${reason}${hasPoints ? damageContext : efficiency}`
      };
    }

    function renderMlJudgement(payload) {
      const judgement = payload.ml_judgement;
      if (!judgement || !judgement.available) return "";
      const accuracy = hasNumber(judgement.validation_accuracy)
        ? `${Math.round(Number(judgement.validation_accuracy) * 100)}%`
        : "n/a";
      return `
        <div class="judgement ml">

          <p class="small">Model: ${escapeHtml(judgement.model_type || "unknown")} | Feature set: ${escapeHtml(judgement.feature_set || "custom")} | Training rows: ${escapeHtml(judgement.training_rows || 0)} | Feature rows: ${escapeHtml(judgement.feature_rows || 0)} | Feature hash: ${escapeHtml(judgement.feature_sha256_short || "unknown")} | Validation accuracy: ${escapeHtml(accuracy)}</p>

    function wireDataReviewFilters() {
      const search = el("data-review-search");
      const status = el("data-review-status");
      const clear = el("data-review-clear");
      if (!search || !status || !clear) return;
      const apply = () => applyDataReviewFilters(search.value, status.value);
      search.addEventListener("input", apply);
      status.addEventListener("change", apply);
      clear.addEventListener("click", () => {
        search.value = "";
        status.value = "";
        apply();
        search.focus();
      });
      apply();
    }

    function statusMatches(text, filter) {
      const normalized = String(text || "").toLowerCase();
      if (!filter) return true;
      if (filter === "problem") return /error|fail|failed|warning/.test(normalized);
      if (filter === "error") return /error|fail|failed/.test(normalized);
      if (filter === "warning") return normalized.includes("warning");
      if (filter === "ok") return /ok|pass|info/.test(normalized);
      return true;
    }

    function applyDataReviewFilters(queryValue, statusValue) {
      const query = String(queryValue || "").trim().toLowerCase();
      const sections = [...document.querySelectorAll("#results .review-section")];
      let visibleSections = 0;
      let visibleRows = 0;
      let totalRows = 0;

      sections.forEach((section) => {
        const rows = [...section.querySelectorAll("tbody tr")];
        const dataRows = rows.filter((row) => !(row.cells.length === 1 && row.cells[0].colSpan > 1));
        const sectionTitleMatches = Boolean(query && section.querySelector("h3") && section.querySelector("h3").textContent.toLowerCase().includes(query));
        let sectionRowsVisible = 0;

        if (dataRows.length) {
          rows.forEach((row) => {
            const isEmptyRow = row.cells.length === 1 && row.cells[0].colSpan > 1;
            if (isEmptyRow) {
              row.hidden = Boolean(query || statusValue);
              return;
            }
            totalRows += 1;
            const text = row.textContent.toLowerCase();
            const statusText = row.cells[0] ? row.cells[0].textContent : "";
            const visible = (!query || text.includes(query) || sectionTitleMatches) && statusMatches(statusText, statusValue);
            row.hidden = !visible;
            if (visible) {
              sectionRowsVisible += 1;
              visibleRows += 1;
            }
          });
          section.hidden = sectionRowsVisible === 0;
        } else {
          const visible = (!query || section.textContent.toLowerCase().includes(query)) && !statusValue;
          section.hidden = !visible;
        }

        if (!section.hidden) visibleSections += 1;
      });

      const status = el("data-review-filter-status");
      if (status) {
        const rowText = totalRows ? `${visibleRows} of ${totalRows} table rows` : "no table rows";
        status.textContent = `${visibleSections} review sections visible, ${rowText} visible`;
      }
      const empty = el("data-review-filter-empty");
      if (empty) empty.classList.toggle("visible", visibleSections === 0);
    }
